site_name: Koda SDK
site_description: AI SDK for Electron desktop applications
repo_url: https://github.disney.com/SANCR225/KodaSDK
repo_name: SANCR225/KodaSDK

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Electron Setup: getting-started/electron-setup.md
  - API Reference:
    - KodaSDK: api/sdk.md
    - Chat & Streaming: api/chat.md
    - Agents: api/agents.md
    - Powers: api/powers.md
    - Tools: api/tools.md
    - Sessions: api/sessions.md
    - Workspaces: api/workspaces.md
    - MCP Servers: api/mcp.md
    - Tokens: api/tokens.md
    - Scoring: api/scoring.md
  - UI Components:
    - Overview: components/overview.md
    - ChatPanel: components/chat-panel.md
    - PromptBar: components/prompt-bar.md
    - PowerButton: components/power-button.md
    - AgentPicker: components/agent-picker.md
    - Theming: components/theming.md
  - Architecture:
    - Overview: architecture/overview.md
    - ACP Protocol: architecture/acp-protocol.md
    - Security: architecture/security.md
  - Guides:
    - Integrating into an App: guides/integration.md
    - Registering Powers: guides/powers.md
    - Bidirectional Tools: guides/tools.md
    - App Manifest (koda-app.json): guides/app-manifest.md
    - SDK CLI (scaffold + release): guides/sdk-cli.md
